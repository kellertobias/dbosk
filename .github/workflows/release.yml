name: Release

# GitHub is a push mirror of the Forgejo repository. Forgejo owns versioning and creates
# the v* tag (see .forgejo/workflows/release.yml); this workflow reacts to the mirrored
# tag, builds dbOSK, and — only if the build succeeds — publishes a GitHub Release with
# the app attached.
#
# dbOSK is an AppKit/SwiftUI app: it can only be compiled against the macOS SDK, so the
# `build` job must run on a macOS runner (GitHub-hosted `macos-26`, a managed VM — no
# self-hosted macOS runner needed). It needs macos-26 specifically: a pinned dependency
# (the MCP swift-sdk) uses Swift 6.2 APIs, so an older Xcode fails to compile it. The
# build targets Apple Silicon (arm64) only: a universal build needs `swift build --arch
# arm64 --arch x86_64`, which routes through the Xcode build system and fails on this
# dependency graph. It is ad-hoc signed only (no Apple Developer account), so the binary
# is not notarized. The `publish` job runs on Linux.

on:
  push:
    tags:
      - "v*.*.*"
  # Rebuild an existing tag, or build an arbitrary ref without publishing, on demand.
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish (e.g. v1.2.3). Leave empty to build the current ref without publishing.
        required: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build macOS app (Apple Silicon)
    # macos-26 is a GitHub-hosted Apple Silicon (arm64) runner. Its default Xcode is 26.x
    # (Swift 6.2+), required to compile the pinned MCP swift-sdk dependency.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Swift toolchain
        run: swift --version

      - name: Build and package the app (.app + .dmg)
        id: build
        env:
          REF: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          # Pin the bundle version to the tag so filenames and CFBundleShortVersionString
          # match the release, regardless of the committed VERSION file.
          case "$REF" in
            v*) VERSION="${REF#v}" ;;
            *)  VERSION="$(tr -d '[:space:]' < VERSION)" ;;
          esac
          export DBOSK_VERSION="$VERSION"

          # Apple Silicon only: a plain `swift build` (no --arch) uses the native build
          # system, avoiding the xcbuild multi-arch path that fails on this dep graph.
          Scripts/make-app.sh --dmg

          echo "==> Binary architecture"
          lipo -archs "dist/dbOSK.app/Contents/MacOS/dbOSK"

          ZIP="dbOSK-${VERSION}-macos-arm64.zip"
          DMG="dbOSK-${VERSION}-macos-arm64.dmg"
          ditto -c -k --sequesterRsrc --keepParent "dist/dbOSK.app" "$ZIP"
          mv "dist/dbOSK.dmg" "$DMG"
          mkdir -p artifacts
          mv "$ZIP" "$DMG" artifacts/
          ( cd artifacts && for f in *.zip *.dmg; do shasum -a 256 "$f" > "$f.sha256"; done )
          ls -la artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: dbOSK-macos-arm64
          path: artifacts/*
          if-no-files-found: error

  # Runs on Linux, only after the macOS build succeeds. A workflow_dispatch run without a
  # tag stops after `build`, leaving the artifacts attached to the run for inspection.
  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.inputs.tag, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dbOSK-macos-arm64
          path: artifacts

      - name: Publish the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: dbOSK ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/*
          body: |
            Native macOS database client — **Apple Silicon (arm64)** build.

            **Unsigned** — there is no Apple Developer account, so this download is not
            notarized. Install it as follows:

            1. Download and unzip the `.zip` (or open the `.dmg`).
            2. Move **dbOSK.app** to /Applications.
            3. Clear the quarantine flag so Gatekeeper allows it to launch:
               ```sh
               xattr -dr com.apple.quarantine /Applications/dbOSK.app
               ```

            Requires macOS 14 (Sonoma) or newer on Apple Silicon. Verify a download with
            its `.sha256` file.
            Prefer building from source? Use the Homebrew cask (see the README).
