services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dbosk
      POSTGRES_PASSWORD: dbosk
      POSTGRES_DB: dbosk_test
    ports:
      - "54329:5432"
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: dbosk
      MYSQL_DATABASE: dbosk_test
    ports:
      - "33069:3306"
    profiles: ["phase4"]
  mongo:
    image: mongo:7
    ports:
      - "27019:27017"
    profiles: ["phase4"]
  redis:
    image: redis:7
    ports:
      - "63799:6379"
    profiles: ["phase8"]
  dynamodb:
    image: amazon/dynamodb-local
    ports:
      - "8009:8000"
    profiles: ["phase8"]
